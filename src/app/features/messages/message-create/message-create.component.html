<div class="create-container">
  <div class="create-header">
    <a routerLink="/messages" class="back-link">&larr; Back to Messages</a>
    <h1>New Message</h1>
  </div>

  @if (errorMessage) {
    <div class="alert alert-error">{{ errorMessage }}</div>
  }
  @if (successMessage) {
    <div class="alert alert-success">{{ successMessage }}</div>
  }

  <form (ngSubmit)="onSubmit()" class="create-form">
    <div class="form-group">
      <label for="recipient">To</label>
      <select id="recipient" [(ngModel)]="selectedUserId" name="recipient" required>
        <option value="">Select a user</option>
        @for (user of users; track user.email) {
          <option [value]="user.email">{{ user.name }} ({{ user.email }})</option>
        }
      </select>
    </div>

    <div class="form-group">
      <label for="body">Message</label>
      <textarea id="body" [(ngModel)]="body" name="body" rows="5" placeholder="Type your message here..." required></textarea>
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-secondary" routerLink="/messages">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="isLoading || !selectedUserId || !body.trim()">
        {{ isLoading ? 'Sending...' : 'Send Message' }}
      </button>
    </div>
  </form>
</div>
